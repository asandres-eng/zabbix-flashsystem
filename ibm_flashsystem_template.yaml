zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 86ccd7b57a994cfd9a35ea4f35ee4692
      name: Templates/SAN
  templates:
    - uuid: 0593c032c42e4cb799b265f6eb395661
      template: 'IBM FlashSystem by HTTP'
      name: 'IBM FlashSystem by HTTP'
      description: |
        Monitoring of IBM FlashSystem / Spectrum Virtualize (code level 8.5+) via the native REST API (port 7443) plus SNMP traps.

        Metrics (REST, polling): system and per-node performance (IOPS, throughput, latency, CPU, cache), per-volume space utilization, per-pool capacity, and an unfixed-events health heartbeat. Two Script (JavaScript) collectors authenticate once per run and fan out to dependent items.

        Health/status events (SNMP traps, via SVC_MIB_9.1.0.MIB): error/warning/informational traps mapped to trigger severities.

        Out of scope: live per-LUN performance (only available via scp of XML stats files).

        Setup: see README.md. Requires macros {$API_USER}/{$API_PASSWORD}, REST port 7443 reachable, an SNMP interface on the host, and snmptrapd configured on the Zabbix side.
      groups:
        - name: Templates/SAN
      items:
        - uuid: 591143665f6248c5a34bbe8617566323
          name: 'Data collection: Performance'
          type: SCRIPT
          key: flashsystem.data.performance
          delay: '{$IBM.PERF.INTERVAL}'
          history: 1h
          trends: '0'
          value_type: TEXT
          params: |
            var p = JSON.parse(value);
            var base = 'https://' + p.host + ':' + p.port + '/rest';

            function login() {
                var r = new HttpRequest();
                r.addHeader('Content-Type: application/json');
                r.addHeader('X-Auth-Username: ' + p.user);
                r.addHeader('X-Auth-Password: ' + p.password);
                var resp = r.post(base + '/auth');
                if (r.getStatus() !== 200) throw 'auth HTTP ' + r.getStatus() + ': ' + resp;
                return JSON.parse(resp).token;
            }
            function call(token, cmd, body) {
                var r = new HttpRequest();
                r.addHeader('Content-Type: application/json');
                r.addHeader('X-Auth-Token: ' + token);
                var resp = r.post(base + '/' + cmd, body ? JSON.stringify(body) : '{}');
                if (r.getStatus() !== 200) throw cmd + ' HTTP ' + r.getStatus() + ': ' + resp;
                return JSON.parse(resp);
            }

            var token = login();

            var sys = call(token, 'lssystemstats');
            var system = {};
            for (var i = 0; i < sys.length; i++) system[sys[i].stat_name] = sys[i].stat_current;

            var nr = call(token, 'lsnodestats');
            var nmap = {};
            for (var j = 0; j < nr.length; j++) {
                var x = nr[j];
                var nid = '' + x.node_id;
                if (!nmap[nid]) nmap[nid] = { node_id: nid, node_name: x.node_name, stats: {} };
                nmap[nid].stats[x.stat_name] = x.stat_current;
            }
            var nodes = [];
            for (var k in nmap) nodes.push(nmap[k]);

            return JSON.stringify({ system: system, nodes: nodes });
          timeout: 30s
          parameters:
            - name: host
              value: '{HOST.CONN}'
            - name: port
              value: '{$API_PORT}'
            - name: user
              value: '{$API_USER}'
            - name: password
              value: '{$API_PASSWORD}'
          tags:
            - tag: component
              value: system
            - tag: scope
              value: performance
        - uuid: 0bc3aa733cbe4e25aca7c4427a170db9
          name: 'Data collection: Capacity'
          type: SCRIPT
          key: flashsystem.data.capacity
          delay: '{$IBM.CAP.INTERVAL}'
          history: 1h
          trends: '0'
          value_type: TEXT
          params: |
            var p = JSON.parse(value);
            var base = 'https://' + p.host + ':' + p.port + '/rest';

            function login() {
                var r = new HttpRequest();
                r.addHeader('Content-Type: application/json');
                r.addHeader('X-Auth-Username: ' + p.user);
                r.addHeader('X-Auth-Password: ' + p.password);
                var resp = r.post(base + '/auth');
                if (r.getStatus() !== 200) throw 'auth HTTP ' + r.getStatus() + ': ' + resp;
                return JSON.parse(resp).token;
            }
            function call(token, cmd, body) {
                var r = new HttpRequest();
                r.addHeader('Content-Type: application/json');
                r.addHeader('X-Auth-Token: ' + token);
                var resp = r.post(base + '/' + cmd, body ? JSON.stringify(body) : '{}');
                if (r.getStatus() !== 200) throw cmd + ' HTTP ' + r.getStatus() + ': ' + resp;
                return JSON.parse(resp);
            }
            function toBytes(v) {
                if (v === undefined || v === null || v === '') return 0;
                var s = ('' + v).trim();
                var m = s.match(/^([0-9.]+)\s*([KMGTP]?)B?$/i);
                if (!m) { var n = parseFloat(s); return isNaN(n) ? 0 : n; }
                var mult = {'':1, K:1024, M:1048576, G:1073741824, T:1099511627776, P:1125899906842624};
                return parseFloat(m[1]) * (mult[m[2].toUpperCase()] || 1);
            }

            var token = login();

            var vd = call(token, 'lsvdisk', { bytes: true });
            var volumes = [];
            for (var i = 0; i < vd.length; i++) {
                var v = vd[i], cap = toBytes(v.capacity), used = toBytes(v.used_capacity);
                volumes.push({ id: '' + v.id, name: v.name, pool: v.mdisk_grp_name || '',
                    capacity: cap, used: used, pct: cap > 0 ? used / cap * 100 : 0, status: v.status });
            }
            var gp = call(token, 'lsmdiskgrp', { bytes: true });
            var pools = [];
            for (var g = 0; g < gp.length; g++) {
                var m = gp[g], pc = toBytes(m.capacity), pf = toBytes(m.free_capacity);
                pools.push({ id: '' + m.id, name: m.name, capacity: pc, free: pf,
                    pct: pc > 0 ? (pc - pf) / pc * 100 : 0, status: m.status });
            }
            var ev = call(token, 'lseventlog', { filtervalue: 'fixed=no' });

            return JSON.stringify({ volumes: volumes, pools: pools, unfixed_events: ev.length });
          timeout: 30s
          parameters:
            - name: host
              value: '{HOST.CONN}'
            - name: port
              value: '{$API_PORT}'
            - name: user
              value: '{$API_USER}'
            - name: password
              value: '{$API_PASSWORD}'
          tags:
            - tag: component
              value: system
            - tag: scope
              value: capacity
        - uuid: 8abd14237f134695b64866c68a1f2df3
          name: 'System: Read IOPS'
          type: DEPENDENT
